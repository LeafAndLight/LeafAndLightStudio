    <text x="42" y="78" fill="#ffffff" font-family="Arial, Helvetica, sans-serif" font-size="64" font-weight="800" letter-spacing="-2">COLLAB WORK</text>
    <text x="44" y="132" fill="#9cf8ff" font-family="Arial, Helvetica, sans-serif" font-size="28" font-weight="700">Art Support</text>
    <text x="44" y="184" fill="#dce8f3" font-family="Arial, Helvetica, sans-serif" font-size="24">Replace with final game screenshot</text>
